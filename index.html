<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Touch-friendly communication helper with voice output for limited communication users." />
  <meta name="theme-color" content="#085c9b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Comm Helper" />
  <meta name="format-detection" content="telephone=no" />
  <title>Commands</title>
  <link rel="manifest" href="manifest.json" />
  <!-- Apple touch icons (use relative paths so the site works under a subfolder too) -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="mask-icon" href="icons/safari-mask.svg" color="#085c9b" />
  <link rel="shortcut icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <meta name="msapplication-TileImage" content="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <div class="page-header">
      <div class="nav-spacer"></div>
      <h1>Commands</h1>
      <a class="nav-link" href="sentences.html">Phrases →</a>
    </div>
    <p class="instructions">Tap an icon to say the word aloud. Designed for easy finger use.</p>

    <div class="button-grid" role="group" aria-label="Communication actions">
      <button class="comm-button" data-word="Linda" aria-label="Linda">
        <span class="icon">💍</span>
        <span class="label">Linda</span>
      </button>
      <button class="comm-button" data-word="Yes" aria-label="Yes">
        <span class="icon">👍</span>
        <span class="label">Yes</span>
      </button>
      <button class="comm-button" data-word="No" aria-label="No">
        <span class="icon">👎</span>
        <span class="label">No</span>
      </button>
      <button class="comm-button" data-word="Ok" aria-label="Ok">
        <span class="icon">👌</span>
        <span class="label">Ok</span>
      </button>
      <button class="comm-button" data-word="Maybe" aria-label="Maybe">
        <span class="icon">🤔</span>
        <span class="label">Maybe</span>
      </button>
      <button class="comm-button" data-word="A little" aria-label="A little">
        <span class="icon">🙂</span>
        <span class="label">A little</span>
      </button>
      <button class="comm-button" data-word="Very much" aria-label="Very much">
        <span class="icon">🌟</span>
        <span class="label">Very much</span>
      </button>
      <button class="comm-button" data-word="Hello" aria-label="Hello">
        <span class="icon">👋</span>
        <span class="label">Hello</span>
      </button>
      <button class="comm-button" data-word="Goodbye" aria-label="Goodbye">
        <span class="icon">👋</span>
        <span class="label">Goodbye</span>
      </button>
      <button class="comm-button" data-word="I don't understand" aria-label="I don't understand">
        <span class="icon">🤷</span>
        <span class="label">Don't Understand</span>
      </button>
      <button class="comm-button" data-word="Pain" aria-label="Pain">
        <span class="icon">😣</span>
        <span class="label">Pain</span>
      </button>
      <button class="comm-button" data-word="Good" aria-label="Good">
        <span class="icon">😊</span>
        <span class="label">Good</span>
      </button>
      <button class="comm-button" data-word="I could be better" aria-label="I could be better">
        <span class="icon">😐</span>
        <span class="label">I could be better</span>
      </button>
      <button class="comm-button" data-word="Nurse" aria-label="Nurse">
        <span class="icon">👩‍⚕️</span>
        <span class="label">Nurse</span>
      </button>
      <button class="comm-button" data-word="Suction Nose" aria-label="Suction Nose">
        <span class="icon">👃</span>
        <span class="label">Suction Nose</span>
      </button>
      <button class="comm-button" data-word="Suction Throat" aria-label="Suction Throat">
        <span class="icon">🫁</span>
        <span class="label">Suction Throat</span>
      </button>
      <button class="comm-button" data-word="Choking" aria-label="Choking">
        <span class="icon">⚠️</span>
        <span class="label">Choking</span>
      </button>
      <button class="comm-button" data-word="I love you" aria-label="I love you">
        <span class="icon">❤️</span>
        <span class="label">I Love You</span>
      </button>
      <button class="comm-button" data-word="Thank you" aria-label="Thank you">
        <span class="icon">🙏</span>
        <span class="label">Thank You</span>
      </button>
      <button class="comm-button" data-word="Adjust Bed" aria-label="Adjust Bed">
        <span class="icon">🛏️</span>
        <span class="label">Adjust Bed</span>
      </button>
      <button class="comm-button" data-word="Adjust Pillow" aria-label="Adjust Pillow">
        <span class="icon">🛌</span>
        <span class="label">Adjust Pillow</span>
      </button>
      <button class="comm-button" data-word="Worried" aria-label="Worried">
        <span class="icon">😟</span>
        <span class="label">Worried</span>
      </button>
      <button class="comm-button" data-word="Please" aria-label="Please">
        <span class="icon">🙏</span>
        <span class="label">Please</span>
      </button>
      <button class="comm-button" data-word="Potty" aria-label="Potty">
        <span class="icon">🚽</span>
        <span class="label">Potty</span>
      </button>
      <button class="comm-button" data-word="Your crazy" aria-label="Your crazy">
        <span class="icon">🤪</span>
        <span class="label">Your Crazy</span>
      </button>
    </div>

    <div class="feedback" aria-live="polite" id="feedback">Ready to communicate.</div>
  </main>
  <script src="script.js"></script>
</body>
</html>
