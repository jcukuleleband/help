<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Famous movie phrases for entertainment and encouragement." />
  <meta name="theme-color" content="#085c9b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Comm Helper" />
  <meta name="format-detection" content="telephone=no" />
  <title>Movie Phrases</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="mask-icon" href="icons/safari-mask.svg" color="#085c9b" />
  <link rel="shortcut icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <meta name="msapplication-TileImage" content="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <div class="page-header">
      <a class="nav-link" href="sentences.html">← Phrases</a>
      <h1>Movie Phrases</h1>
      <a class="nav-link" href="index.html">Commands →</a>
    </div>

    <p class="instructions">Tap a phrase to hear a famous movie quote.</p>

    <div class="button-grid" role="group" aria-label="Famous movie phrases">
      <button class="comm-button" data-word="May the Force be with you" aria-label="May the Force be with you">
        <span class="icon">⭐</span>
        <span class="label">May the Force be with you</span>
      </button>
      <button class="comm-button" data-word="I'll be back" aria-label="I'll be back">
        <span class="icon">💪</span>
        <span class="label">I'll be back</span>
      </button>
      <button class="comm-button" data-word="Here's looking at you, kid" aria-label="Here's looking at you, kid">
        <span class="icon">🎬</span>
        <span class="label">Here's looking at you, kid</span>
      </button>
      <button class="comm-button" data-word="Show me the money" aria-label="Show me the money">
        <span class="icon">💰</span>
        <span class="label">Show me the money</span>
      </button>
      <button class="comm-button" data-word="E.T. phone home" aria-label="E.T. phone home">
        <span class="icon">👽</span>
        <span class="label">E.T. phone home</span>
      </button>
      <button class="comm-button" data-word="Houston, we have a problem" aria-label="Houston, we have a problem">
        <span class="icon">🚀</span>
        <span class="label">Houston, we have a problem</span>
      </button>
      <button class="comm-button" data-word="You can't handle the truth" aria-label="You can't handle the truth">
        <span class="icon">⚖️</span>
        <span class="label">You can't handle the truth</span>
      </button>
      <button class="comm-button" data-word="Life is like a box of chocolates" aria-label="Life is like a box of chocolates">
        <span class="icon">🍫</span>
        <span class="label">Life is like a box of chocolates</span>
      </button>
      <button class="comm-button" data-word="I feel the need for speed" aria-label="I feel the need for speed">
        <span class="icon">✈️</span>
        <span class="label">I feel the need for speed</span>
      </button>
      <button class="comm-button" data-word="Go ahead, make my day" aria-label="Go ahead, make my day">
        <span class="icon">😎</span>
        <span class="label">Go ahead, make my day</span>
      </button>
      <button class="comm-button" data-word="I'll have what she's having" aria-label="I'll have what she's having">
        <span class="icon">🍽️</span>
        <span class="label">I'll have what she's having</span>
      </button>
      <button class="comm-button" data-word="That's all folks" aria-label="That's all folks">
        <span class="icon">🎭</span>
        <span class="label">That's all folks</span>
      </button>
    </div>

    <div class="feedback" aria-live="polite" id="feedback">Ready to entertain.</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
